apiVersion: v1
kind: Namespace
metadata:
  name: healthcare
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: healthcare-config
  namespace: healthcare
data:
  KAFKA_BOOTSTRAP: "kafka.healthcare.svc.cluster.local:9092"
  DB_HOST: "healthcare-db.xxxxx.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "healthcare"
  REDIS_HOST: "redis.healthcare.svc.cluster.local"
  CONSENT_SERVICE_URL: "http://consent-service:8082"
  FHIR_BASE_URL: "https://hie.partner.com/fhir/R4"
---
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-secrets
  namespace: healthcare
type: Opaque
stringData:
  DB_USER: healthcare
  DB_PASSWORD: replace-me
  OPENAI_API_KEY: replace-me
  JWT_SECRET: replace-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: healthcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/patient-service:1.0.0
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: healthcare-config
            - secretRef:
                name: healthcare-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: healthcare
spec:
  selector:
    app: patient-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consent-service
  namespace: healthcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: consent-service
  template:
    metadata:
      labels:
        app: consent-service
    spec:
      containers:
        - name: consent-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/consent-service:1.0.0
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: healthcare-config
            - secretRef:
                name: healthcare-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: consent-service
  namespace: healthcare
spec:
  selector:
    app: consent-service
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-service
  namespace: healthcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: integration-service
  template:
    metadata:
      labels:
        app: integration-service
    spec:
      containers:
        - name: integration-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/integration-service:1.0.0
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: healthcare-config
            - secretRef:
                name: healthcare-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: integration-service
  namespace: healthcare
spec:
  selector:
    app: integration-service
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: healthcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/ai-service:1.0.0
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: healthcare-config
            - secretRef:
                name: healthcare-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: healthcare
spec:
  selector:
    app: ai-service
  ports:
    - port: 8084
      targetPort: 8084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/notification-service:1.0.0
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: healthcare-config
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: healthcare
spec:
  selector:
    app: notification-service
  ports:
    - port: 8085
      targetPort: 8085
