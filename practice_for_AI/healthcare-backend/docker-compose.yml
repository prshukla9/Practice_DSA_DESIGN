version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql

  patient-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: patient-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: healthcare
      DB_USER: healthcare
      DB_PASSWORD: healthcare
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  consent-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: consent-service
    environment:
      DB_HOST: postgres
      KAFKA_BOOTSTRAP: kafka:29092
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - kafka

  integration-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: integration-service
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      CONSENT_SERVICE_URL: http://consent-service:8082
      FHIR_BASE_URL: https://hapi.fhir.org/baseR4
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - redis
      - consent-service

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: ai-service
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      CONSENT_SERVICE_URL: http://consent-service:8082
      OPENAI_API_KEY: ${OPENAI_API_KEY:-changeme}
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - redis
      - consent-service

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: notification-service
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    ports:
      - "8085:8085"
    depends_on:
      - kafka
