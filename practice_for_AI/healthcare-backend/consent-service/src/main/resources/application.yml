server:
  port: 8082

spring:
  application:
    name: consent-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:healthcare}
    username: ${DB_USER:healthcare}
    password: ${DB_PASSWORD:healthcare}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: consent
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
