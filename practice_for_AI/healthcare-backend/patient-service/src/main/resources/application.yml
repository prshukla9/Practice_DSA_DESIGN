server:
  port: 8081

spring:
  application:
    name: patient-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:healthcare}
    username: ${DB_USER:healthcare}
    password: ${DB_PASSWORD:healthcare}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: patient

management:
  endpoints:
    web:
      exposure:
        include: health,info
